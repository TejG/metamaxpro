name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    branches:
      - main

permissions:
  contents: write

env:
  NODE_VERSION: '22'

jobs:
  # Helper: determine tag name for this run (v{pkg.version} for main pushes, tag ref for tag pushes)
  # Each build job computes TAG and, when the event is a push to main, creates a GitHub Release with that tag.

  build-mac-arm64:
    runs-on: macos-latest
    if: "startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Determine tag name
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          else
            TAG_NAME="v$(node -p "require('./package.json').version")"
          fi
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create release (for pushes to main or tags)
        if: "github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')"
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          release_name: ${{ steps.tag.outputs.tag }}
          body: "Automated release for ${{ steps.tag.outputs.tag }}"

      - name: Install dependencies
        run: npm ci

      - name: Build macOS arm64
        run: npx electron-forge make --platform darwin --arch arm64

      - name: Upload macOS arm64 artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: out/make/**/*.dmg

  # macOS x64 (Intel)
  build-mac-x64:
    runs-on: macos-13
    if: "startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Determine tag name
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          else
            TAG_NAME="v$(node -p "require('./package.json').version")"
          fi
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create release (for pushes to main)
        if: github.ref == 'refs/heads/main'
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          release_name: ${{ steps.tag.outputs.tag }}
          body: "Automated release for ${{ steps.tag.outputs.tag }}"

      - name: Install dependencies
        run: npm ci

      - name: Build macOS x64
        run: npx electron-forge make --platform darwin --arch x64

      - name: Upload macOS x64 artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: out/make/**/*.dmg

  # Windows x64
  build-windows:
    runs-on: windows-latest
    if: "startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Determine tag name
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          else
            TAG_NAME="v$(node -p "require('./package.json').version")"
          fi
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create release (for pushes to main)
        if: github.ref == 'refs/heads/main'
        uses: actions/create-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          release_name: ${{ steps.tag.outputs.tag }}
          body: "Automated release for ${{ steps.tag.outputs.tag }}"

      - name: Install dependencies
        run: npm ci

      - name: Build Windows x64
        run: npx electron-forge make --platform win32 --arch x64

      - name: Upload Windows x64 artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            out/make/squirrel.windows/**/*.exe
            out/make/**/*.msi