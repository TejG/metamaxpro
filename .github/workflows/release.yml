name: Release

# Releases are cut from tags only. Push a `v*` tag (e.g. `git push origin v0.10.0`)
# and this builds every platform and publishes the GitHub Release. Pushing to
# `main` no longer triggers a build — that previously spawned a second run that
# raced the tag run and failed with `already_exists`.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  NODE_VERSION: '22'

# `softprops/action-gh-release@v2` creates the release if it's missing and
# updates it (uploading/overwriting assets) if it already exists, so no separate
# create-release step is needed — and it's safe for the platform jobs to run
# concurrently against the same tag.
jobs:
  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS arm64
        run: npx electron-forge make --platform darwin --arch arm64

      - name: Upload macOS arm64 artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          # .dmg = manual first install; .zip = Squirrel.Mac auto-update feed
          files: |
            out/make/**/*.dmg
            out/make/zip/**/*.zip

  build-mac-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS x64
        run: npx electron-forge make --platform darwin --arch x64

      - name: Upload macOS x64 artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          # .dmg = manual first install; .zip = Squirrel.Mac auto-update feed
          files: |
            out/make/**/*.dmg
            out/make/zip/**/*.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows x64
        run: npx electron-forge make --platform win32 --arch x64

      - name: Upload Windows x64 artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          # Squirrel.Windows auto-update needs the full feed, not just the .exe:
          # RELEASES (the manifest) + the *-full.nupkg must be on the release too.
          files: |
            out/make/squirrel.windows/**/*.exe
            out/make/squirrel.windows/**/*.nupkg
            out/make/squirrel.windows/**/RELEASES
            out/make/**/*.msi
