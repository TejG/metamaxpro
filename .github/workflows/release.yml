name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── macOS arm64 (Apple Silicon) ──────────────────────────────
  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build macOS arm64
        run: npx electron-forge make --platform darwin --arch arm64
      - name: Upload macOS arm64
        uses: softprops/action-gh-release@v2
        with:
          files: out/make/**/*.dmg

  # ── macOS x64 (Intel) ────────────────────────────────────────
  build-mac-x64:
    runs-on: macos-13        # last Intel-based runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build macOS x64
        run: npx electron-forge make --platform darwin --arch x64
      - name: Upload macOS x64
        uses: softprops/action-gh-release@v2
        with:
          files: out/make/**/*.dmg

  # ── Windows x64 ──────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build Windows x64
        run: npx electron-forge make --platform win32 --arch x64
      - name: Upload Windows x64
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/make/squirrel.windows/**/*.exe
            out/make/**/*.msi
