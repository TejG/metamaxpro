name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Make distributables
        run: npm run make --if-present

      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: out/make

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts (mac)
        uses: actions/download-artifact@v4
        with:
          name: dist-macos-latest
          path: ./dist/macos || true

      - name: Download artifacts (windows)
        uses: actions/download-artifact@v4
        with:
          name: dist-windows-latest
          path: ./dist/windows || true

      - name: List downloaded files
        run: |
          echo "mac list:"; ls -la ./dist || true
          echo "windows list:"; ls -la ./dist || true

      - name: Create GitHub Release and upload assets
        uses: ncipollo/release-action@v1
        with:
          artifacts: |
            dist/macos/*.dmg
            dist/windows/*.exe
          tag: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── macOS arm64 (Apple Silicon) ──────────────────────────────
  build-mac-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build macOS arm64
        run: npx electron-forge make --platform darwin --arch arm64
      - name: Upload macOS arm64
        uses: softprops/action-gh-release@v2
        with:
          files: out/make/**/*.dmg

  # ── macOS x64 (Intel) ────────────────────────────────────────
  build-mac-x64:
    runs-on: macos-13        # last Intel-based runner
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build macOS x64
        run: npx electron-forge make --platform darwin --arch x64
      - name: Upload macOS x64
        uses: softprops/action-gh-release@v2
        with:
          files: out/make/**/*.dmg

  # ── Windows x64 ──────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build Windows x64
        run: npx electron-forge make --platform win32 --arch x64
      - name: Upload Windows x64
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/make/squirrel.windows/**/*.exe
            out/make/**/*.msi
