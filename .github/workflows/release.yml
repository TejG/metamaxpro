name: release-build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
name: release-build

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build distributables
        run: npm run make --if-present

      - name: Upload built artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: out/make/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

