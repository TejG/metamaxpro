name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    branches:
      - main

permissions:
  contents: write

env:
  NODE_VERSION: '22'

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.determine.outputs.tag }}
    if: "startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Determine tag name
        id: determine
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
          else
            TAG_NAME="v$(node -p 'require("./package.json").version')"
          fi
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create release (if missing)
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.determine.outputs.tag }}
          release_name: ${{ steps.determine.outputs.tag }}
          body: "Automated release for ${{ steps.determine.outputs.tag }}"
  build-mac-arm64:
    runs-on: macos-latest
    needs: prepare-release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS arm64
        run: npx electron-forge make --platform darwin --arch arm64

      - name: Upload macOS arm64 artifacts to release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          # .dmg = manual first install; .zip = Squirrel.Mac auto-update feed
          files: |
            out/make/**/*.dmg
            out/make/zip/**/*.zip

  build-mac-x64:
    runs-on: macos-13
    needs: prepare-release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS x64
        run: npx electron-forge make --platform darwin --arch x64

      - name: Upload macOS x64 artifacts to release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          # .dmg = manual first install; .zip = Squirrel.Mac auto-update feed
          files: |
            out/make/**/*.dmg
            out/make/zip/**/*.zip

  build-windows:
    runs-on: windows-latest
    needs: prepare-release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows x64
        run: npx electron-forge make --platform win32 --arch x64

      - name: Upload Windows x64 artifacts to release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.prepare-release.outputs.tag }}
          # Squirrel.Windows auto-update needs the full feed, not just the .exe:
          # RELEASES (the manifest) + the *-full.nupkg must be on the release too.
          files: |
            out/make/squirrel.windows/**/*.exe
            out/make/squirrel.windows/**/*.nupkg
            out/make/squirrel.windows/**/RELEASES
            out/make/**/*.msi